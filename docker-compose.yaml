version: '3.9'

services:
  database:
    image: postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: tma
    ports:
      - "5432:5432"
    volumes:
      - db:/var/lib/postgresql/data

  client:
    container_name: client
    build:
      context: ./client
      dockerfile: Dockerfile
    volumes:
      - static:/app/dist

  server:
    container_name: server
    environment:
      - TONPROOF_PAYLOAD_SIGNATURE_KEY=${TONPROOF_PAYLOAD_SIGNATURE_KEY:?set it in .env}
      - ADMIN_SECRET_KEY=${ADMIN_SECRET_KEY:?set it in .env}
      - WALLET_SEED=${WALLET_SEED:?set it in .env}
      - BANK_ADDR=${BANK_ADDR:?set it in .env}
      - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD:-password}@database/tma
    build:
      context: ./server
      dockerfile: Dockerfile
    depends_on:
      - database
    ports:
      - "443:443"
    volumes:
      - static:/app/static
      - /etc/letsencrypt/live/tonpredictionmarket.com:/etc/letsencrypt/live/tonpredictionmarket.com:ro # Монтируем сертификаты
    links:
      - database


volumes:
  static:
  db:
    driver: local
